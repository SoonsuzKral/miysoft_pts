[program:miysoft-queue-default]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/miysoft_pts/artisan queue:work --queue=default --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/miysoft_pts/storage/logs/queue-default.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5

